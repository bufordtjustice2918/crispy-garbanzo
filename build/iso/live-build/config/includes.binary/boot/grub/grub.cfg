# Serial console for headless QEMU CI tests (-nographic mode).
# Placed via config/includes.binary/ so it reliably overrides live-build's
# generated grub.cfg. Binary hooks were not executing in ubuntu mode.
serial --speed=115200 --unit=0 --word=8 --parity=no --stop=1
terminal_input  serial console
terminal_output serial console

set default=0
set timeout=5

menuentry "Clawgress Live" {
    linux /live/vmlinuz boot=live components quiet console=ttyS0,115200n8 ---
    initrd /live/initrd.img
}

# Fallback: some live-build/casper versions place kernel under /casper/
menuentry "Clawgress Live (casper)" {
    linux /casper/vmlinuz boot=casper quiet console=ttyS0,115200n8 ---
    initrd /casper/initrd
}
