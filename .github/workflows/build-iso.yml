name: build-iso

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-iso.yml"
      - "build/iso/**"
      - "deploy/nftables/**"

jobs:
  build-livecd:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            syslinux-utils

      # Cache the lb chroot + stage markers. Key covers package lists, hooks,
      # includes.chroot, AND the build script (lb config args live there).
      # includes.binary is intentionally excluded -- those files go into the
      # binary stage which runs every time, not into the cached chroot.
      - name: Restore lb chroot cache
        id: lb-cache
        uses: actions/cache@v4
        with:
          path: |
            build/iso/live-build/chroot
            build/iso/live-build/.build
          key: lb-chroot-noble-amd64-${{ hashFiles('build/iso/live-build/config/package-lists/**', 'build/iso/live-build/config/hooks/**', 'build/iso/live-build/config/includes.chroot/**', 'build/iso/scripts/build-livecd.sh') }}
          restore-keys: |
            lb-chroot-noble-amd64-

      - name: Build Ubuntu 24.04 LiveCD ISO
        env:
          DISTRO: noble
          ARCH: amd64
          ISO_NAME: clawgress-noble-amd64.iso
          MIRROR: http://azure.archive.ubuntu.com/ubuntu/
          SECURITY_MIRROR: http://security.ubuntu.com/ubuntu/
          LB_CACHE_HIT: ${{ steps.lb-cache.outputs.cache-hit }}
        run: |
          sudo -E ./build/iso/scripts/build-livecd.sh

      # lb build runs as sudo so chroot is root-owned; fix before actions/cache saves.
      - name: Fix chroot ownership for cache save
        if: steps.lb-cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R "$(id -u):$(id -g)" build/iso/live-build/chroot build/iso/live-build/.build 2>/dev/null || true

      - name: Generate checksums
        run: cd build/iso/out && sha256sum *.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawgress-livecd-iso
          path: |
            build/iso/out/*.iso
            build/iso/out/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  boot-test:
    needs: build-livecd
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    container:
      image: ubuntu:24.04
      # --privileged gives the container direct /dev/kvm access and also
      # allows loop-mounting the ISO to extract kernel/initrd directly.
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            git qemu-system-x86 mount

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: clawgress-livecd-iso
          path: build/iso/out

      - name: Boot ISO in QEMU and run live self-test
        run: |
          ./build/iso/scripts/boot-test.sh build/iso/out/clawgress-noble-amd64.iso 700

      - name: Upload boot test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-log
          path: build/iso/out/boot-test.log
          if-no-files-found: ignore
