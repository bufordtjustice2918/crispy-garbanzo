name: build-iso

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-iso.yml"
      - "build/iso/**"
      - "deploy/nftables/**"

jobs:
  build-livecd:
    runs-on: ubuntu-24.04
    container:
      image: debian:bookworm
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          apt-get update -qq
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            syslinux-utils \
            ca-certificates \
            curl

      - name: Install Go 1.22
        run: |
          curl -fsSL https://go.dev/dl/go1.22.10.linux-amd64.tar.gz -o /tmp/go.tar.gz
          tar -C /usr/local -xzf /tmp/go.tar.gz
          echo 'export PATH=$PATH:/usr/local/go/bin' >> /etc/profile
          /usr/local/go/bin/go version

      - name: Build Go binaries for ISO
        run: |
          export PATH=$PATH:/usr/local/go/bin
          SBIN=build/iso/live-build/config/includes.chroot/usr/local/sbin
          GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o "${SBIN}/clawgress-gateway" \
            ./cmd/clawgress-gateway
          GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o "${SBIN}/clawgress-admin-api" \
            ./cmd/clawgress-admin-api
          GOOS=linux GOARCH=amd64 go build \
            -trimpath -ldflags="-s -w" \
            -o "${SBIN}/clawgressctl" \
            ./cmd/clawgressctl
          chmod +x "${SBIN}/clawgress-gateway" "${SBIN}/clawgress-admin-api" "${SBIN}/clawgressctl"
          echo "Gateway binary: $(file ${SBIN}/clawgress-gateway)"
          echo "Admin API binary: $(file ${SBIN}/clawgress-admin-api)"
          echo "CLI binary: $(file ${SBIN}/clawgressctl)"

      - name: Restore lb chroot cache
        id: lb-cache
        continue-on-error: true
        uses: actions/cache@v4
        with:
          path: |
            build/iso/live-build/chroot
            build/iso/live-build/.build
          key: lb-chroot-bookworm-amd64-${{ hashFiles('build/iso/live-build/config/package-lists/**', 'build/iso/live-build/config/hooks/**', 'build/iso/live-build/config/includes.chroot/**', 'build/iso/scripts/build-livecd.sh') }}
          restore-keys: |
            lb-chroot-bookworm-amd64-

      - name: Build Debian Bookworm LiveCD ISO
        env:
          DISTRO: bookworm
          ARCH: amd64
          ISO_NAME: clawgress-bookworm-amd64.iso
          MIRROR: http://deb.debian.org/debian
          LB_CACHE_HIT: ${{ steps.lb-cache.outputs.cache-hit }}
        run: |
          ./build/iso/scripts/build-livecd.sh

      - name: Fix chroot ownership for cache save
        if: steps.lb-cache.outputs.cache-hit != 'true'
        run: |
          chown -R "$(id -u):$(id -g)" build/iso/live-build/chroot build/iso/live-build/.build 2>/dev/null || true

      - name: Generate checksums
        run: cd build/iso/out && sha256sum *.iso > SHA256SUMS

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawgress-livecd-iso
          path: |
            build/iso/out/*.iso
            build/iso/out/SHA256SUMS
          if-no-files-found: error
          retention-days: 14

  boot-test:
    needs: build-livecd
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          DEBIAN_FRONTEND=noninteractive sudo apt-get install -y \
            qemu-system-x86 qemu-utils \
            python3 python3-pexpect \
            ovmf

      - name: Verify KVM access
        run: |
          ls -la /dev/kvm && echo "KVM available" || echo "KVM not available — will use TCG"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: clawgress-livecd-iso
          path: build/iso/out

      - name: Boot ISO via GRUB/CDROM and check live selftest
        run: |
          ./build/iso/scripts/boot-test.sh build/iso/out/clawgress-bookworm-amd64.iso 120

      - name: E2E smoke suite (pexpect login + service checks)
        run: |
          python3 build/iso/scripts/test-iso-commands.py \
            --iso build/iso/out/clawgress-bookworm-amd64.iso \
            --suite smoke \
            --boot-timeout 120 \
            --log-dir build/iso/out/e2e-logs

      - name: Upload boot test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: boot-test-logs
          path: |
            build/iso/out/boot-test.log
            build/iso/out/e2e-logs/
          if-no-files-found: ignore
