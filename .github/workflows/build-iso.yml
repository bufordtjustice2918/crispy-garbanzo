name: build-iso

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/build-iso.yml"
      - "build/iso/**"
      - "deploy/nftables/**"

jobs:
  build-livecd:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            live-build \
            debootstrap \
            xorriso \
            squashfs-tools \
            grub-pc-bin \
            grub-efi-amd64-bin \
            mtools \
            dosfstools \
            qemu-system-x86 \
            syslinux-utils

      # Cache the lb chroot + stage markers. Key covers package lists, hooks,
      # includes, AND the build script itself (lb config args live there), so
      # changes to --apt-recommends, --debootstrap-options, etc. bust the cache.
      - name: Restore lb chroot cache
        id: lb-cache
        uses: actions/cache@v4
        with:
          path: |
            build/iso/live-build/chroot
            build/iso/live-build/.build
          key: lb-chroot-noble-amd64-${{ hashFiles('build/iso/live-build/config/package-lists/**', 'build/iso/live-build/config/hooks/**', 'build/iso/live-build/config/includes.chroot/**', 'build/iso/scripts/build-livecd.sh') }}
          restore-keys: |
            lb-chroot-noble-amd64-

      - name: Build Ubuntu 24.04 LiveCD ISO
        env:
          DISTRO: noble
          ARCH: amd64
          ISO_NAME: clawgress-noble-amd64.iso
          # Azure mirror is geographically close to GitHub's Azure East US runners.
          MIRROR: http://azure.archive.ubuntu.com/ubuntu/
          SECURITY_MIRROR: http://security.ubuntu.com/ubuntu/
          LB_CACHE_HIT: ${{ steps.lb-cache.outputs.cache-hit }}
        run: |
          sudo -E ./build/iso/scripts/build-livecd.sh

      # lb build runs as sudo so chroot is root-owned; fix before actions/cache
      # tries to save it as the runner user.
      - name: Fix chroot ownership for cache save
        if: steps.lb-cache.outputs.cache-hit != 'true'
        run: |
          sudo chown -R "$(id -u):$(id -g)" build/iso/live-build/chroot build/iso/live-build/.build 2>/dev/null || true

      # GitHub ubuntu-24.04 runners have /dev/kvm but the runner user needs
      # group access. chmod 666 is the standard CI workaround.
      - name: Enable KVM access for QEMU boot test
        run: |
          echo "kvm devices before:"
          ls -la /dev/kvm 2>/dev/null || echo "/dev/kvm not present"
          sudo chmod 666 /dev/kvm 2>/dev/null || true
          echo "kvm devices after:"
          ls -la /dev/kvm 2>/dev/null || echo "/dev/kvm not present"

      # With KVM the 400s ceiling is generous. boot-test.sh uses an adaptive
      # timeout internally -- TCG fallback gets 2400s if KVM is absent.
      - name: Boot ISO in QEMU and run live self-test
        run: |
          ./build/iso/scripts/boot-test.sh build/iso/out/clawgress-noble-amd64.iso 400

      # Checksum generation and upload are one logical operation.
      - name: Generate checksums and upload ISO artifacts
        run: cd build/iso/out && sha256sum *.iso > SHA256SUMS

      - name: Upload ISO artifacts
        uses: actions/upload-artifact@v4
        with:
          name: clawgress-livecd-iso
          path: |
            build/iso/out/*.iso
            build/iso/out/SHA256SUMS
            build/iso/out/boot-test.log
          if-no-files-found: error
          retention-days: 14
